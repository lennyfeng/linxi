services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: internal-platform-api
    restart: unless-stopped
    network_mode: host
    environment:
      - APP_NAME=internal-platform-api
      - PORT=3101
      - NODE_ENV=production
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_NAME=internal_platform
      - DB_USER=linxi_app
      - DB_PASSWORD=Linxi@sql

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: internal-platform-web
    restart: unless-stopped
    ports:
      - "3201:3200"
    environment:
      - PORT=3200
      - API_TARGET=http://host.docker.internal:3101
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api

  minio:
    image: minio/minio:latest
    container_name: internal-platform-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/internal-platform;
      mc anonymous set download local/internal-platform/public;
      echo 'Bucket initialized';
      "

volumes:
  minio-data:
